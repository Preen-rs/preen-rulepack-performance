schema_version = 1
id = "performance-maintenance-preview"
name = "Maintenance Preview"
category = { Other = "performance" }
risk = "Medium"
enabled = true

[match]
mode = "Command"
paths = []
strategy = "Shallow"
command = ["sh", "-lc", "echo preen-performance-maintenance"]
parser = ""

[action]
action_type = "RunCommand"
paths = []
command = ["sh", "-lc", "echo preen-performance-maintenance-action"]
mode = "Confirm"
timeout_sec = 60
allow_globs = false
max_items = 100
package_manager = ""
project_types = []
params = { smart_care_capability = "performance", smart_care_review_hint = "Review maintenance tasks before run" }
