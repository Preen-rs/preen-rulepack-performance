schema_version = 1
id = "performance-system-status"
name = "System Status Snapshot"
category = "Other"
risk = "Low"
enabled = true

[match]
mode = "Command"
paths = []
strategy = "Shallow"
command = ["sh", "-lc", "echo preen-performance-status"]
parser = ""

[action]
action_type = "SystemStatus"
paths = []
command = []
mode = "Confirm"
timeout_sec = 30
allow_globs = false
max_items = 1000
package_manager = ""
project_types = []
params = { smart_care_capability = "performance", smart_care_review_hint = "Review system load and uptime before optimize actions" }
