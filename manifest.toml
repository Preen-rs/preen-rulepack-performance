schema_version = 1
pack_id = "preen-rs.performance.base"
name = "Preen Performance Base"
version = "0.1.0"
description = "Official base capability pack for performance-oriented Smart Care checks on macOS and Linux."
author = "Preen Team"
license = "MIT"
homepage = "https://github.com/Preen-rs/preen-rulepack-performance"
core_compat = ">=0.1.0,<2.0.0"
action_api = 1
os_targets = ["Macos", "Linux"]
capabilities = ["FsRead", "SystemOptimize", "RunCommand"]

[signing]
sigstore = true
issuer = "https://token.actions.githubusercontent.com"
identity = "https://github.com/Preen-rs/preen-rulepack-performance/.github/workflows/release-manual.yml@refs/heads/main"

[[rules]]
id = "performance-system-status"
name = "System Status Snapshot"
rule_file = "rules/performance-system-status.toml"

[[rules]]
id = "performance-maintenance-preview"
name = "Maintenance Preview"
rule_file = "rules/performance-maintenance-preview.toml"
